<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 320" width="1000" height="320">
  <defs>
    <radialGradient id="doughGrad" cx="0.4" cy="0.35" r="0.6">
      <stop offset="0%" stop-color="#F5D5A0"/>
      <stop offset="40%" stop-color="#E8B56A"/>
      <stop offset="100%" stop-color="#C8883A"/>
    </radialGradient>

    <linearGradient id="glazeGrad" x1="0" y1="0" x2="0.8" y2="1">
      <stop offset="0%" stop-color="#FF6B6B"/>
      <stop offset="50%" stop-color="#FF8E72"/>
      <stop offset="100%" stop-color="#FFAA85"/>
    </linearGradient>

    <radialGradient id="glazeShine" cx="0.3" cy="0.25" r="0.5">
      <stop offset="0%" stop-color="rgba(255,255,255,0.35)"/>
      <stop offset="100%" stop-color="rgba(255,255,255,0)"/>
    </radialGradient>

    <mask id="donutMask">
      <rect width="1000" height="320" fill="black"/>
      <circle cx="160" cy="160" r="130" fill="white"/>
      <circle cx="160" cy="160" r="52" fill="black"/>
    </mask>

    <clipPath id="glazeClip">
      <circle cx="160" cy="160" r="128"/>
    </clipPath>

    <filter id="shadow" x="-10%" y="-10%" width="125%" height="130%">
      <feDropShadow dx="0" dy="4" stdDeviation="6" flood-color="rgba(0,0,0,0.1)"/>
    </filter>
  </defs>

  <!-- === DONUT ICON (left side) === -->
  <g filter="url(#shadow)">
    <g mask="url(#donutMask)">
      <circle cx="160" cy="160" r="130" fill="url(#doughGrad)"/>

      <!-- Glaze with drips -->
      <path d="
        M30,160
        C30,88 88,30 160,30
        C232,30 290,88 290,160
        L290,172
        C285,172 280,186 274,172
        C268,172 264,172 258,172
        C252,172 248,192 242,172
        C236,172 230,172 224,172
        C218,172 215,182 210,172
        C204,172 198,172 192,172
        C186,172 182,198 176,172
        C170,172 164,172 158,172
        C152,172 148,185 142,172
        C136,172 130,172 124,172
        C118,172 114,178 108,172
        C102,172 96,172 90,172
        C84,172 80,190 74,172
        C68,172 62,172 56,172
        C50,172 46,178 40,172
        L30,172
        Z
      " fill="url(#glazeGrad)" clip-path="url(#glazeClip)"/>

      <path d="
        M30,160
        C30,88 88,30 160,30
        C232,30 290,88 290,160
        L290,172
        C285,172 280,186 274,172
        C268,172 264,172 258,172
        C252,172 248,192 242,172
        C236,172 230,172 224,172
        C218,172 215,182 210,172
        C204,172 198,172 192,172
        C186,172 182,198 176,172
        C170,172 164,172 158,172
        C152,172 148,185 142,172
        C136,172 130,172 124,172
        C118,172 114,178 108,172
        C102,172 96,172 90,172
        C84,172 80,190 74,172
        C68,172 62,172 56,172
        C50,172 46,178 40,172
        L30,172
        Z
      " fill="url(#glazeShine)" clip-path="url(#glazeClip)"/>

      <!-- Network lines -->
      <line x1="95" y1="100" x2="135" y2="80" stroke="white" stroke-width="1.5" opacity="0.4" stroke-linecap="round"/>
      <line x1="135" y1="80" x2="185" y2="72" stroke="white" stroke-width="1.5" opacity="0.35" stroke-linecap="round"/>
      <line x1="185" y1="72" x2="225" y2="92" stroke="white" stroke-width="1.5" opacity="0.4" stroke-linecap="round"/>
      <line x1="135" y1="80" x2="148" y2="125" stroke="white" stroke-width="1.5" opacity="0.3" stroke-linecap="round"/>
      <line x1="185" y1="72" x2="198" y2="120" stroke="white" stroke-width="1.5" opacity="0.3" stroke-linecap="round"/>

      <!-- Network nodes -->
      <circle cx="95" cy="100" r="5" fill="white" opacity="0.95"/>
      <circle cx="135" cy="80" r="4" fill="white" opacity="0.9"/>
      <circle cx="185" cy="72" r="5.5" fill="white" opacity="0.95"/>
      <circle cx="225" cy="92" r="4.5" fill="white" opacity="0.9"/>
      <circle cx="148" cy="125" r="3.5" fill="white" opacity="0.85"/>
      <circle cx="198" cy="120" r="4.5" fill="white" opacity="0.9"/>

      <!-- Accent dots -->
      <circle cx="115" cy="65" r="2.5" fill="white" opacity="0.55"/>
      <circle cx="210" cy="62" r="2.5" fill="white" opacity="0.55"/>
    </g>
  </g>

  <!-- === TYPOGRAPHY (right side) === -->
  <text x="370" y="155" text-anchor="start"
        font-family="'Inter', 'Helvetica Neue', 'Arial', sans-serif"
        font-size="80" font-weight="800" fill="#2C2C2C" letter-spacing="12">GMO</text>

  <text x="372" y="210" text-anchor="start"
        font-family="'Inter', 'Helvetica Neue', 'Arial', sans-serif"
        font-size="36" font-weight="400" fill="#2C2C2C" letter-spacing="12">DONUTS</text>

  <!-- Divider line -->
  <line x1="340" y1="110" x2="340" y2="220" stroke="#E0E0E0" stroke-width="1.5"/>

  <!-- Tagline -->
  <text x="372" y="248" text-anchor="start"
        font-family="'Inter', 'Helvetica Neue', 'Arial', sans-serif"
        font-size="11" font-weight="400" fill="#AAAAAA" letter-spacing="5">CONNECT THROUGH FLAVOR</text>
</svg>