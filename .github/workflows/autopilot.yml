name: kaizokuokabu autopilot

on:
  schedule:
    # 朝7時 JST = UTC 22:00（プライマリ＋バックアップ）
    - cron: '0 22 * * *'
    - cron: '20 22 * * *'
    # 昼12時半 JST = UTC 03:30（プライマリ＋バックアップ）
    - cron: '30 3 * * *'
    - cron: '50 3 * * *'
    # 夜21時 JST = UTC 12:00（プライマリ＋バックアップ）
    - cron: '0 12 * * *'
    - cron: '20 12 * * *'
  workflow_dispatch:
    inputs:
      mode:
        description: '実行モード (morning/noon/evening/full)'
        required: false
        default: 'full'

jobs:
  autopilot:
    runs-on: ubuntu-latest
    timeout-minutes: 120
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Check if already ran (dedup)
        id: dedup
        if: github.event_name == 'schedule'
        run: |
          git fetch origin master
          if git log origin/master --oneline --since="90 minutes ago" --grep="autopilot" | grep -q "autopilot"; then
            echo "Already ran in the last 90 min. Skipping."
            echo "skip=true" >> $GITHUB_OUTPUT
          else
            echo "No recent run found. Proceeding."
            echo "skip=false" >> $GITHUB_OUTPUT
          fi

      - name: Setup Node.js
        if: steps.dedup.outputs.skip != 'true'
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Install Japanese fonts
        if: steps.dedup.outputs.skip != 'true'
        run: sudo apt-get install -y fonts-noto-cjk fonts-noto-cjk-extra

      - name: Install dependencies
        if: steps.dedup.outputs.skip != 'true'
        run: npm install

      - name: Run autopilot
        if: steps.dedup.outputs.skip != 'true'
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          X_API_KEY: ${{ secrets.X_API_KEY }}
          X_API_SECRET: ${{ secrets.X_API_SECRET }}
          X_ACCESS_TOKEN: ${{ secrets.X_ACCESS_TOKEN }}
          X_ACCESS_TOKEN_SECRET: ${{ secrets.X_ACCESS_TOKEN_SECRET }}
        run: |
          MODE="${{ github.event.inputs.mode }}"
          if [ -n "$MODE" ]; then
            node scripts/autopilot.js --$MODE
          else
            node scripts/autopilot.js
          fi

      - name: Commit updated data files
        if: steps.dedup.outputs.skip != 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git pull --rebase origin master || true
          git add data/
          git diff --staged --quiet || git commit -m "chore: update data files [autopilot $(date -u +%Y-%m-%dT%H:%M)]"
          git push
